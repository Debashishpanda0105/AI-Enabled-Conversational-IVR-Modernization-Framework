<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IRCTC IVR SIMULATOR - Milestone 3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .glass-panel { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(8px); border: 1px solid #334155; }
        .debug-tag { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; padding: 2px 8px; border-radius: 4px; font-family: monospace; }
        .confidence-bar { height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden; }
        .confidence-fill { height: 100%; background: #10b981; transition: width 0.5s; }
        .chat-scroll::-webkit-scrollbar { width: 5px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">

    <header class="p-4 glass-panel flex justify-between items-center px-8">
        <div class="flex items-center gap-4">
            <div class="bg-orange-600 p-2 rounded-lg"><i class="fa-solid fa-train-subway text-white text-xl"></i></div>
            <div>
                <h1 class="font-bold tracking-tight">IRCTC IVR SIMULATOR</h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest">Milestone 3 • Conversational AI • Zero Backend</p>
            </div>
        </div>
        <div class="flex gap-3">
            <span class="text-[10px] bg-slate-800 px-2 py-1 rounded border border-slate-700">M3</span>
            <span class="text-[10px] bg-emerald-900/30 text-emerald-400 px-2 py-1 rounded border border-emerald-800/50">• Frontend-Only</span>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-72 p-6 border-r border-slate-800 flex flex-col gap-6 overflow-y-auto">
            <h2 class="text-xs font-bold text-slate-500 uppercase">Controls</h2>
            <div class="flex bg-slate-900 p-1 rounded-lg">
                <button onclick="setMode('convo')" id="btn-convo" class="flex-1 py-2 text-xs font-bold rounded-md bg-blue-600 text-white"><i class="fa-solid fa-comment-dots mr-2"></i>Convo</button>
                <button onclick="setMode('dtmf')" id="btn-dtmf" class="flex-1 py-2 text-xs font-bold rounded-md text-slate-400"><i class="fa-solid fa-keyboard mr-2"></i>DTMF</button>
            </div>

            <div id="quick-actions" class="space-y-2">
                <h3 class="text-[10px] font-bold text-slate-600 uppercase">Quick Actions</h3>
                <button onclick="sendAction('Book Ticket')" class="w-full flex justify-between items-center p-3 rounded-lg bg-slate-800/50 border border-slate-700 hover:border-blue-500 transition text-sm">
                    <span><i class="fa-solid fa-ticket mr-3 text-orange-400"></i>Book Ticket</span><span class="text-slate-600">1</span>
                </button>
                <button onclick="sendAction('PNR Status')" class="w-full flex justify-between items-center p-3 rounded-lg bg-slate-800/50 border border-slate-700 hover:border-blue-500 transition text-sm">
                    <span><i class="fa-solid fa-file-invoice mr-3 text-blue-400"></i>PNR Status</span><span class="text-slate-600">2</span>
                </button>
                <button onclick="sendAction('Cancel Ticket')" class="w-full flex justify-between items-center p-3 rounded-lg bg-slate-800/50 border border-slate-700 hover:border-blue-500 transition text-sm">
                    <span><i class="fa-solid fa-xmark mr-3 text-red-400"></i>Cancel Ticket</span><span class="text-slate-600">4</span>
                </button>
            </div>
            
            <div id="keypad" class="hidden grid grid-cols-3 gap-2">
                {[1,2,3,4,5,6,7,8,9,'*',0,'#'].map(n => `<button onclick="sendAction('${n}')" class="p-4 bg-slate-800 rounded-lg font-bold hover:bg-slate-700">${n}</button>`).join('')}
            </div>
        </aside>

        <section class="flex-1 flex flex-col p-8 relative">
            <div id="chat-area" class="flex-1 overflow-y-auto space-y-6 chat-scroll pr-4">
                <div class="text-center text-slate-600 my-20">Click Start Session to begin</div>
            </div>

            <div class="mt-6 flex items-center gap-4 bg-slate-900/80 p-2 rounded-2xl border border-slate-800">
                <button id="mic-btn" onclick="startVoice()" class="w-12 h-12 rounded-xl bg-slate-800 text-red-500 flex items-center justify-center hover:bg-slate-700 transition">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <input id="user-input" type="text" placeholder="Type or speak..." class="flex-1 bg-transparent border-none outline-none text-sm" onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" class="px-6 text-blue-500 font-bold"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
            <div class="mt-2 text-[10px] text-slate-500 flex gap-4 px-2">
                <span><i class="fa-solid fa-volume-high mr-1"></i> TTS: On</span>
                <span id="listening-status" class="text-emerald-500 hidden"><i class="fa-solid fa-circle-dot animate-pulse mr-1"></i> Listening...</span>
            </div>
        </section>

        <aside class="w-80 p-6 border-l border-slate-800 glass-panel space-y-8">
            <div>
                <h2 class="text-xs font-bold text-slate-500 uppercase mb-4">Debug</h2>
                <p class="text-[10px] text-slate-600">Live NLU State</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-slate-500 uppercase">Session ID</label>
                    <div id="debug-session" class="p-2 bg-slate-950 rounded border border-slate-800 font-mono text-xs text-blue-400 mt-1">SIM-NOT-READY</div>
                </div>

                <div>
                    <label class="text-[10px] text-slate-500 uppercase">Current State</label>
                    <div id="debug-state" class="p-2 bg-slate-950 rounded border border-slate-800 font-mono text-xs text-orange-400 mt-1">idle</div>
                </div>

                <div>
                    <label class="text-[10px] text-slate-500 uppercase flex justify-between">Confidence <span id="conf-val" class="text-emerald-500">0%</span></label>
                    <div class="confidence-bar mt-2"><div id="conf-fill" class="confidence-fill" style="width: 0%"></div></div>
                </div>

                <div>
                    <label class="text-[10px] text-slate-500 uppercase">Entities Collected</label>
                    <div id="debug-entities" class="mt-2 flex flex-wrap gap-2 text-[10px]">
                        <span class="text-slate-600">None</span>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        let sessionId = null;
        const chatArea = document.getElementById('chat-area');

        function setMode(mode) {
            document.getElementById('quick-actions').classList.toggle('hidden', mode === 'dtmf');
            document.getElementById('keypad').classList.toggle('hidden', mode === 'convo');
            document.getElementById('btn-convo').className = mode === 'convo' ? 'flex-1 py-2 text-xs font-bold rounded-md bg-blue-600 text-white' : 'flex-1 py-2 text-xs font-bold rounded-md text-slate-400';
            document.getElementById('btn-dtmf').className = mode === 'dtmf' ? 'flex-1 py-2 text-xs font-bold rounded-md bg-blue-600 text-white' : 'flex-1 py-2 text-xs font-bold rounded-md text-slate-400';
        }

        async function startCall() {
            const res = await fetch("http://127.0.0.1:8000/ivr/start", {method:"POST"});
            const data = await res.json();
            sessionId = data.session_id;
            document.getElementById('debug-session').innerText = sessionId;
            updateChat('bot', data.reply);
            speak(data.reply);
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value;
            if(!msg || !sessionId) return;
            
            updateChat('user', msg);
            input.value = '';

            const res = await fetch("http://127.0.0.1:8000/ivr/chat", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({ session_id: sessionId, message: msg })
            });
            const data = await res.json();
            updateChat('bot', data.reply);
            updateDebug(data);
            speak(data.reply);
        }

        function updateChat(role, text) {
            if(chatArea.children[0]?.classList.contains('text-center')) chatArea.innerHTML = '';
            const div = document.createElement('div');
            div.className = role === 'bot' ? "flex gap-3" : "flex justify-end";
            div.innerHTML = role === 'bot' ? 
                `<div class="w-8 h-8 bg-slate-800 rounded-lg flex items-center justify-center text-xs"><i class="fa-solid fa-robot"></i></div>
                 <div class="bg-slate-800 p-4 rounded-2xl rounded-tl-none max-w-sm text-sm">${text}</div>` :
                `<div class="bg-blue-600 p-4 rounded-2xl rounded-tr-none max-w-sm text-sm text-white">${text}</div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function updateDebug(data) {
            document.getElementById('debug-state').innerText = data.state;
            document.getElementById('conf-val').innerText = data.confidence + "%";
            document.getElementById('conf-fill').style.width = data.confidence + "%";
            
            const entDiv = document.getElementById('debug-entities');
            entDiv.innerHTML = '';
            if(Object.keys(data.entities).length > 0) {
                for(let key in data.entities) {
                    entDiv.innerHTML += `<span class="debug-tag">${key}: ${data.entities[key]}</span>`;
                }
            } else { entDiv.innerHTML = '<span class="text-slate-600">None</span>'; }
        }

        function startVoice() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'en-IN';
            rec.onstart = () => document.getElementById('listening-status').classList.remove('hidden');
            rec.onend = () => document.getElementById('listening-status').classList.add('hidden');
            rec.onresult = (e) => {
                document.getElementById('user-input').value = e.results[0][0].transcript;
                sendMessage();
            }
            rec.start();
        }

        function speak(text) {
            const s = new SpeechSynthesisUtterance(text);
            s.lang = "en-IN";
            window.speechSynthesis.speak(s);
        }

        function sendAction(val) {
            document.getElementById('user-input').value = val;
            sendMessage();
        }

        // Auto-start session for better demo
        window.onload = startCall;
    </script>
</body>
</html>
